services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grocery
      POSTGRES_USER: grocery
      POSTGRES_PASSWORD: grocery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_URL: postgresql://grocery:grocery@db:5432/grocery
    depends_on:
      - db

volumes:
  pgdata:
