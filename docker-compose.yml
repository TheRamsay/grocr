services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grocery
      POSTGRES_USER: grocery
      POSTGRES_PASSWORD: grocery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_URL: postgresql://grocery:grocery@db:5432/grocery
    depends_on:
      - db

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: grocery
      MB_DB_PASS: grocery
      MB_DB_HOST: db
    depends_on:
      - db

volumes:
  pgdata:
